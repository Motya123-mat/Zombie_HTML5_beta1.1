        .announcement.show{display:block}

        .maintenance{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(145deg,#1a1a2e,#0a0a1e);display:none;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-align:center;padding:24px;z-index:99998}

        .banned{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0000;display:none;flex-direction:column;justify-content:center;align-items:center;color:#ff4444;text-align:center;padding:24px;z-index:99999}

        .damage-popup{position:absolute;font-size:24px;font-weight:800;color:#ff6b6b;text-shadow:0 0 10px rgba(255,0,0,0.5);animation:damageFloat 0.8s ease-out forwards;pointer-events:none}

    </style>

function $(id){ return document.getElementById(id); }

function getGlobal(){
    try{ return JSON.parse(localStorage.getItem(GLOBAL_KEY)) || {ann:null,promo:[],maint:null}; }
    catch(e){ return {ann:null,promo:[],maint:null}; }
}

function toast(m,t){
    var e = $('toast');
    if(!e) return;
    e.textContent = m;
    e.className = 'toast ' + (t||'') + ' show';    setTimeout(function(){ e.classList.remove('show'); }, 2800);
}

function saveGame(){
    if(!P) return;
    P.lastSave = Date.now();
    P.version = VERSION;
    try{
        localStorage.setItem(SAVE_KEY, JSON.stringify(P));
        var ind = $('save-ind');
        if(ind){
            ind.classList.add('show');
            setTimeout(function(){ ind.classList.remove('show'); }, 1200);
        }
    }catch(e){ console.error('Save failed:', e); }
}

function loadGame(){
    try{
        var d = localStorage.getItem(SAVE_KEY);
        if(d) return JSON.parse(d);
        var old = localStorage.getItem(OLD_SAVE_KEY);
        if(old) return migrateOldSave(JSON.parse(old));
        return null;
    }catch(e){ console.error('Load failed:', e); return null; }
}

function migrateOldSave(old){
    var np = newPlayer();
    console.log('🔄 Миграция данных из Beta 1.0...');
    
    if(old.id) np.id = old.id;
    if(old.name) np.name = old.name;
    if(old.avatar) np.avatar = old.avatar;
    if(old.money) np.money = old.money;
    if(old.rainbowMoney !== undefined) np.rainbow = old.rainbowMoney;
    else if(old.rainbow !== undefined) np.rainbow = old.rainbow;
    if(old.level) np.lvl = old.level;
    else if(old.lvl) np.lvl = old.lvl;
    if(old.exp) np.xp = old.exp;
    else if(old.xp) np.xp = old.xp;
    if(old.totalKills) np.kills = old.totalKills;
    else if(old.kills) np.kills = old.kills;
    if(old.bossKills) np.bossKills = old.bossKills;
    if(old.maxWave) np.maxWave = old.maxWave;
    if(old.usedPromos) np.usedPromo = old.usedPromos;
    else if(old.usedPromo) np.usedPromo = old.usedPromo;
    if(old.achievements) np.achieve = old.achievements;
    else if(old.achieve) np.achieve = old.achieve;
    if(old.created) np.created = old.created;    
    // Миграция оружия
    if(old.weapons && old.weapons.length > 0){
        np.weapons = [];
        for(var i=0;i<old.weapons.length;i++){
            var ow = old.weapons[i];
            if(typeof ow === 'object'){
                if(ow.id !== undefined){
                    np.weapons.push({id: ow.id, dur: ow.dur !== undefined ? ow.dur : (ow.durability || 999)});
                }else if(ow.name){
                    var idx = WEAPONS.findIndex(w => w.n === ow.name);
                    if(idx>=0) np.weapons.push({id: idx, dur: ow.durability !== undefined ? ow.durability : 999});
                }
            }else if(typeof ow === 'number'){
                np.weapons.push({id: ow, dur: WEAPONS[ow] ? WEAPONS[ow].m : 999});
            }
        }
        if(np.weapons.length===0) np.weapons = [{id:0,dur:-1},{id:21,dur:250}];
    }
    
    if(old.battlePass){
        var bp = old.battlePass;
        np.bp = {
            lvl: bp.level || bp.lvl || 0,
            xp: bp.xp || 0,
            claimed: bp.claimed || bp.rewardsClaimed || []
        };
    }
    if(old.dailyBonus || old.daily){
        var db = old.dailyBonus || old.daily;
        np.daily = { last: db.last || db.lastDailyBonus || 0, streak: db.streak || 0 };
    }
    
    console.log('✅ Миграция завершена!');
    return np;
}

function fmt(n){
    if(n>=1e6) return (n/1e6).toFixed(1)+'M';
    if(n>=1e3) return (n/1e3).toFixed(1)+'K';
    return String(n);
}

function checkBan(){
    try{
        var b = localStorage.getItem(BAN_KEY);
        if(b){
            var ban = JSON.parse(b);
            if(ban.until > Date.now()){
                $('banned').classList.add('show');                $('app').style.display = 'none';
                return true;
            }
            localStorage.removeItem(BAN_KEY);
        }
    }catch(e){}
    return false;
}

function checkMaint(){
    var g = getGlobal();
    var app = $('app');
    var el = $('maintenance');
    if(g.maint && g.maint.on){
        el.classList.add('show');
        $('maint-reason').textContent = g.maint.reason || 'Техработы';
        if(app) app.style.display = 'none';
        return true;
    }
    el.classList.remove('show');
    if(app) app.style.display = 'flex';
    return false;
}

function checkAnn(){
    var g = getGlobal();
    var el = $('announcement');
    var txt = $('ann-text');
    if(!el || !txt) return;
    if(g.ann && g.ann.text){
        var last = localStorage.getItem('zgz_last_ann');
        if(last !== String(g.ann.ts)){
            txt.textContent = g.ann.text;
            el.classList.add('show');
        }
    }else{
        el.classList.remove('show');
    }
}

function newPlayer(){
    return {
        id: 'ZGZ_' + Math.random().toString(36).substr(2,8).toUpperCase(),
        name: 'Survivor', avatar: '🧟', money: 300, rainbow: 5,
        lvl: 1, xp: 0, weapons: [{id:0,dur:-1},{id:21,dur:250}],
        kills: 0, bossKills: 0, maxWave: 0, games: 0,
        usedPromo: [], achieve: [],
        bp: {lvl:0,xp:0,claimed:[]},
        daily: {last:0,streak:0},
        created: Date.now(), lastSave: Date.now(), version: VERSION    };
}

function render(){
    try{
        var app = $('app');
        if(!app) return;
        app.innerHTML = '<div id="header"><div class="player-info"><div class="avatar" id="h-avatar">'+P.avatar+'</div><div class="player-details"><div class="player-name" id="h-name">'+P.name+'</div><div class="player-level">Уровень '+P.lvl+'</div></div></div><div class="currencies"><div class="currency gold">💰 <span id="h-money">'+fmt(P.money)+'</span></div><div class="currency rainbow">🌈 <span id="h-rainbow">'+P.rainbow+'</span></div></div></div><div id="nav"></div><div id="content"></div>';
        
        var nav = $('nav');
        var tabs = ['home','shop','limited','inv','bp','achieve','daily','promo','profile'];
        var icons = ['🏠','🛒','✨','🎒','🎖️','🏆','🎁','🎟️','👤'];
        
        var navHtml = '', pagesHtml = '';
        for(var i=0;i<tabs.length;i++){
            navHtml += '<button class="nav-btn'+(i===0?' active':'')+'" data-p="'+tabs[i]+'">'+icons[i]+'</button>';
            pagesHtml += '<div class="page'+(i===0?' active':'')+'" id="p-'+tabs[i]+'"></div>';
        }
        pagesHtml += '<div class="page" id="p-battle"></div>';
        nav.innerHTML = navHtml;
        $('content').innerHTML = pagesHtml;
        
        nav.onclick = function(e){
            var btn = e.target.closest('.nav-btn');
            if(btn) goPage(btn.getAttribute('data-p'));
        };

    }catch(e){ console.error('Render failed:', e); }
}

function goPage(p){
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-p')===p));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    var el = $('p-'+p);
    if(el) el.classList.add('active');
}

function updHeader(){
    var m=$('h-money'), r=$('h-rainbow');
    if(m) m.textContent=fmt(P.money);
    if(r) r.textContent=P.rainbow;
}

function renderAll(){
    renderHome(); renderShop(); renderLimited(); renderInv(); renderBP(); renderAchieve(); renderDaily(); renderPromo(); renderProfile();
}

function renderShop(){

    var h='<div class="section-title">🛒 Магазин оружия</div><div class="grid">';
    for(var i=0;i<WEAPONS.length;i++){
        var w=WEAPONS[i]; if(w.p<=0) continue;
        var own = P.weapons.some(pw => pw.id===w.id);
        var canBuy = P.money >= w.p && !own;
        h += '<div class="item-card'+(own?' owned':'')+'"><div class="item-icon">'+w.i+'</div><div class="item-name">'+w.n+'</div><div class="item-stats">⚔️ '+w.d+' | ⏱️ '+(w.cd/1000).toFixed(1)+'с</div><div class="item-price gold">💰 '+fmt(w.p)+'</div><button class="btn item-btn'+(own?' secondary':'')+'" data-buyid="'+w.id+'"'+(canBuy?'':' disabled')+'>'+(own?'✓ Есть':'Купить')+'</button></div>';
    }
    h += '</div>';
    el.innerHTML = h;
    
    // Исправленный обработчик покупок
    el.onclick = function(e){
        var btn = e.target.closest('[data-buyid]');
        if(btn && !btn.disabled) buyWeapon(parseInt(btn.getAttribute('data-buyid')));
    };
}

function renderInv(){
    var el=$('p-inv'); if(!el) return;
    var h='<div class="section-title">🎒 Инвентарь ('+P.weapons.length+')</div><div class="grid">';    for(var i=0;i<P.weapons.length;i++){
        var pw=P.weapons[i], w=WEAPONS.find(x=>x.id===pw.id);
        if(!w) continue;
        var pct = w.m===-1 ? 100 : (pw.dur/w.m)*100;
        var low = pct<30, broken = w.m!==-1 && pw.dur<=0;
        h += '<div class="item-card"><div class="item-icon">'+w.i+'</div><div class="item-name">'+w.n+'</div><div class="item-stats">⚔️ '+w.d+'</div>';
        if(w.m!==-1){
            h += '<div class="progress-bar" style="height:6px;"><div class="progress-fill '+(low?'red':'green')+'" style="width:'+pct+'%"></div></div><div style="font-size:10px;color:'+(low?'var(--danger)':'var(--text-dim)')+';">'+pw.dur+'/'+w.m+'</div>';

    DAILY.forEach((v,i) => { h += '<div class="daily-day'+(i<streak?' done':'')+(i===streak&&canClaim?' today':'')+'"><div class="daily-day-num">День '+(i+1)+'</div><div class="daily-day-reward">'+v+'</div></div>'; });
    h += '</div></div>';
    el.innerHTML = h;
    if(canClaim) { var b=$('claim-daily'); if(b) b.onclick=claimDaily; }
}

    var list=$('avatar-list');
    avatars.forEach(a => {
        var btn=document.createElement('button');
        btn.className='btn '+(P.avatar===a?'':'secondary');

        if(e.target.dataset.av){ P.avatar=e.target.dataset.av; saveGame(); toast('Аватар изменён!'); render(); }

function buyWeapon(id){
    var w=WEAPONS.find(x=>x.id===id);
    if(!w) return;
    if(P.weapons.some(pw=>pw.id===id)) return toast('Уже есть!','error');
    if(P.money<w.p) return toast('Мало монет!','error');
    
    P.money -= w.p;
    P.weapons.push({id:id, dur:w.m});
    toast('Куплено: '+w.i+' '+w.n+'!');    checkAchievements(); saveGame(); updHeader(); renderShop(); renderInv();
}

function buyWeaponR(id){
    var w=WEAPONS.find(x=>x.id===id);
    if(!w) return;
    if(P.weapons.some(pw=>pw.id===id)) return toast('Уже есть!','error');
    if(P.rainbow<w.r) return toast('Мало Rainbow!','error');
    
    P.rainbow -= w.r;
    P.weapons.push({id:id, dur:w.m});
    toast('Куплено: '+w.i+' '+w.n+'!','gold');
    checkAchievements(); saveGame(); updHeader(); renderLimited(); renderInv();
}

function repairWeapon(idx){
    var pw=P.weapons[idx]; if(!pw) return;
    var w=WEAPONS.find(x=>x.id===pw.id);
    if(!w||w.m===-1) return;
    var cost=Math.ceil((w.m-pw.dur)*1.5);
    if(P.money<cost) return toast('Мало монет!','error');
    P.money-=cost; pw.dur=w.m;
    toast('Починено за '+cost+'💰!'); saveGame(); updHeader(); renderInv();
}

function usePromo(code){
    code=code.toUpperCase().trim();
    if(!code) return toast('Введите код!','error');
    if(!P.usedPromo) P.usedPromo=[];
    if(P.usedPromo.includes(code)) return toast('Уже использован!','error');
    
    var g=getGlobal(), pr=g.promo?g.promo.find(p=>p.code===code):null;
    if(!pr) return toast('Неверный код!','error');
    if(pr.maxUses>0 && (pr.uses||0)>=pr.maxUses) return toast('Код исчерпан!','error');
    
    var msg='';
    if(pr.type==='money'){ P.money+=pr.value; msg='+'+pr.value+'💰'; }
    else if(pr.type==='rainbow'){ P.rainbow+=pr.value; msg='+'+pr.value+'🌈'; }
    else if(pr.type==='bp_xp'){ addBPXP(pr.value); msg='+'+pr.value+' BP XP'; }
    else if(pr.type==='weapon'){
        var w=WEAPONS[pr.value];
        if(w && !P.weapons.some(pw=>pw.id===w.id)){ P.weapons.push({id:w.id,dur:w.m}); msg='Оружие: '+w.i+' '+w.n; }
        else{ P.money+=1000; msg='+1000💰'; }
    }
    
    pr.uses=(pr.uses||0)+1;
    try{ localStorage.setItem(GLOBAL_KEY,JSON.stringify(g)); }catch(e){}
    P.usedPromo.push(code);
    toast(msg,'gold'); saveGame(); updHeader(); renderPromo(); renderInv();
}
function addBPXP(x){
    if(!P.bp) P.bp={lvl:0,xp:0,claimed:[]};
    P.bp.xp+=x;
    for(var i=0;i<BP_REWARDS.length;i++){
        if(P.bp.xp>=BP_REWARDS[i].x && P.bp.lvl<BP_REWARDS[i].l){
            P.bp.lvl=BP_REWARDS[i].l; toast('🎖️ BP Уровень '+P.bp.lvl+'!','gold');
        }
    }
    saveGame();
}

function claimBP(lvl){
    if(!P.bp) P.bp={lvl:0,xp:0,claimed:[]};
    if(P.bp.claimed.includes(lvl)) return toast('Уже получено!','error');
    if(P.bp.lvl<lvl) return toast('Уровень не достигнут!','error');
    var r=BP_REWARDS.find(x=>x.l===lvl); if(!r) return;
    if(r.t==='c') P.money+=r.v;
    else if(r.t==='r') P.rainbow+=r.v;
    else if(r.t==='w'){
        var w=WEAPONS[r.v];
        if(w && !P.weapons.some(pw=>pw.id===w.id)) P.weapons.push({id:w.id,dur:w.m});
        else P.money+=2000;
    }
    P.bp.claimed.push(lvl); toast('Получено: '+r.d+'!','gold'); saveGame(); updHeader(); renderBP(); renderInv();
}

function claimDaily(){
    var today=new Date().setHours(0,0,0,0), lastDay=new Date(P.daily.last||0).setHours(0,0,0,0), yesterday=today-86400000;
    P.daily.streak = (lastDay>=yesterday&&lastDay<today) ? Math.min((P.daily.streak||0)+1,7) : 1;
    var reward=DAILY[Math.min(P.daily.streak-1,6)], rainbowB=P.daily.streak>=7?5:0;
    P.money+=reward; if(rainbowB) P.rainbow+=rainbowB;
    P.daily.last=Date.now();
    toast('+'+reward+'💰'+(rainbowB?' +'+rainbowB+'🌈':'')+' Серия: '+P.daily.streak,'gold');
    saveGame(); updHeader(); renderDaily();
}

function checkAchievements(){
    if(!P.achieve) P.achieve=[];
    ACHIEVEMENTS.forEach(a => {
        if(P.achieve.includes(a.id)) return;
        var prog = a.k==='kills'?P.kills:a.k==='maxWave'?P.maxWave:a.k==='bossKills'?P.bossKills:a.k==='money'?P.money:a.k==='weaponCount'?P.weapons.length:0;
        if(prog>=a.g){ P.achieve.push(a.id); P.rainbow+=a.r; toast('🏆 '+a.n+'! +'+a.r+'🌈','gold'); }
    });
    saveGame();
}

function startBattle(mode){
    B={on:true,mode:mode,wave:0,z:null,sel:0,cds:{},tmr:null,time:60,combo:0,lastHit:0};
    P.games++; goPage('battle'); nextWave();}

function nextWave(){
    B.wave++;
    var zIdx = Math.min(Math.floor(B.wave/4), 3);
    if(B.mode==='boss'&&B.wave>=6) zIdx=4;
    if(B.mode==='night') zIdx=Math.min(zIdx+1,4);
    var z=ZOMBIES[zIdx], mult=B.mode==='night'?1.5:1, waveMult=1+B.wave*0.08;
    B.z={id:z.id,n:z.n,i:z.i,hp:Math.ceil(z.hp*waveMult*mult),maxHp:Math.ceil(z.hp*waveMult*mult),c:z.c,x:z.x,rb:z.rb};
    
    if(B.mode==='time'&&!B.tmr){
        B.tmr=setInterval(()=>{
            B.time--;
            if(B.time<=0) endBattle(true);
            renderBattle();
        },1000);
    }
    renderBattle();
}

function renderBattle(){
    var el=$('p-battle'); if(!el||!B.on){ if(el) el.innerHTML=''; return; }
    var z=B.z, hpPct=z?(z.hp/z.maxHp)*100:0;
    var h='<button class="back-btn" id="exit-b">⬅ Выйти</button>';
    h+='<div class="wave-display">🌊 Волна '+B.wave+'</div>';
    if(B.mode==='time') h+='<div class="timer-display">⏱️ '+B.time+'</div>';
    h+='<div class="battle-area" id="battle-area">';
    if(B.combo>=3) h+='<div class="combo-display">🔥 x'+B.combo+'</div>';
    h+='<div class="zombie-name">'+(z?z.n:'')+'</div><div class="zombie-sprite">'+(z?z.i:'🧟')+'</div><div class="hp-bar"><div class="hp-fill" style="width:'+Math.max(0,hpPct)+'%"></div></div><div class="zombie-hp">'+(z?Math.ceil(z.hp):0)+' / '+(z?z.maxHp:0)+' HP</div></div>';
    
    h+='<div class="weapon-bar">';
    P.weapons.forEach((pw,i) => {
        var w=WEAPONS.find(x=>x.id===pw.id); if(!w) return;
        var broken=w.m!==-1&&pw.dur<=0, cdEnd=B.cds[w.id]||0, now=Date.now(), inCd=now<cdEnd;
        var cdSec=inCd?Math.ceil((cdEnd-now)/1000):0, durPct=w.m===-1?100:(pw.dur/w.m)*100;
        h+='<div class="weapon-slot'+(i===B.sel?' selected':'')+(broken?' broken':'')+(inCd?' cooldown':'')+'" data-w="'+i+'"><div class="weapon-slot-icon">'+w.i+'</div><div class="weapon-slot-name">'+w.n+'</div>';
        if(inCd) h+='<div class="weapon-slot-cd">'+cdSec+'</div>';
        if(w.m!==-1) h+='<div class="weapon-dur"><div class="weapon-dur-fill'+(durPct<30?' low':'')+'" style="width:'+durPct+'%"></div></div>';
        h+='</div>';
    });
    h+='</div><button class="attack-btn" id="atk-btn">⚔️ АТАКА</button>';
    h+='<div class="card" style="text-align:center;margin-top:12px;"><span style="color:var(--gold);">💰 '+fmt(P.money)+'</span> • <span style="color:var(--rainbow);">🌈 '+P.rainbow+'</span> • <span style="color:var(--accent-light);">⭐ '+P.xp+'/'+(P.lvl*80)+'</span></div>';
    el.innerHTML=h;
    
    $('exit-b').onclick=()=>{ if(confirm('Выйти из боя?')) endBattle(false); };
    $('atk-btn').onclick=attack;
    el.querySelectorAll('[data-w]').forEach((slot,i)=>{ slot.onclick=()=>{ B.sel=i; renderBattle(); }; });
}

function attack(){    if(!B.on||!B.z) return;
    var pw=P.weapons[B.sel]; if(!pw) return;
    var w=WEAPONS.find(x=>x.id===pw.id); if(!w) return;
    var now=Date.now();
    if(B.cds[w.id]&&now<B.cds[w.id]) return;
    if(w.m!==-1&&pw.dur<=0) return toast('Оружие сломано!','error');
    
    B.cds[w.id]=now+w.cd;
    B.combo = (now-B.lastHit<1500)?B.combo+1:1;
    B.lastHit=now;
    
    var dmg=w.d*(1+P.lvl*0.04);
    if(B.combo>=3) dmg*=1+(B.combo-2)*0.1;
    if(B.mode==='arena') dmg*=1.2;
    dmg=Math.ceil(dmg);
    
    B.z.hp-=dmg;
    if(w.m!==-1) pw.dur--;
    
    showDamage(dmg);
    if(B.z.hp<=0) killZombie();
    renderBattle(); saveGame();
}

function showDamage(d){
    var area=$('battle-area'); if(!area) return;
    var pop=document.createElement('div'); pop.className='damage-popup'; pop.textContent='-'+d;
    pop.style.left=(Math.random()*60+20)+'%'; pop.style.top='40%';
    area.appendChild(pop); setTimeout(()=>pop.remove(),800);
}

function killZombie(){
    var z=B.z, coinMult=B.mode==='time'?2:(B.mode==='night'?1.5:1), rbMult=B.mode==='night'?2:1;
    var coins=Math.ceil(z.c*coinMult), rb=Math.ceil(z.rb*rbMult);
    P.money+=coins; P.rainbow+=rb; P.xp+=z.x; P.kills++;
    addBPXP(1);
    if(z.id===4){ P.bossKills++; P.rainbow+=15; toast('+15 🌈 за босса!','gold'); }
    while(P.xp>=P.lvl*80){ P.xp-=P.lvl*80; P.lvl++; P.rainbow+=3; toast('🎉 Уровень '+P.lvl+'! +3 🌈','gold'); }
    if(P.maxWave<B.wave) P.maxWave=B.wave;
    addBPXP(3); checkAchievements();
    if(B.mode==='boss'&&B.wave>=6&&z.id===4) endBattle(true);
    else setTimeout(nextWave,600);
    saveGame(); updHeader();
}

function endBattle(win){
    B.on=false; if(B.tmr){ clearInterval(B.tmr); B.tmr=null; }
    if(win){ var bonus=B.wave*10; P.money+=bonus; toast('🏆 Победа! Волна '+B.wave+', +'+bonus+'💰','gold'); }
    else toast('💀 Поражение на волне '+B.wave,'error');
    saveGame(); goPage('home'); renderAll();}

function init(){
    try{
        if(checkBan()) return;
        if(checkMaint()) return;
        P = loadGame();
        if(!P){ P=newPlayer(); toast('🎁 Добро пожаловать!','gold'); }
        // Гарантируем структуру данных
        P.bp=P.bp||{lvl:0,xp:0,claimed:[]}; P.bp.claimed=P.bp.claimed||[];
        P.daily=P.daily||{last:0,streak:0};
        P.achieve=P.achieve||[]; P.usedPromo=P.usedPromo||[];
        P.rainbow=P.rainbow||0; P.weapons=P.weapons||[{id:0,dur:-1}];
        
        saveGame(); render(); checkAnn();
        setInterval(checkAnn, 15000);
        setInterval(()=>{ checkMaint(); }, 15000);
        setInterval(saveGame, 20000);
        
        $('close-ann').onclick=()=>{
            var g=getGlobal(); if(g.ann) localStorage.setItem('zgz_last_ann',String(g.ann.ts));
            $('announcement').classList.remove('show');
        };
        window.addEventListener('storage',e=>{ if(e.key===GLOBAL_KEY){ checkAnn(); checkMaint(); } });
    }catch(e){
        console.error('Init failed:', e);
        toast('Ошибка загрузки','error');
    }
}

// Безопасный запуск после загрузки DOM
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();
</script>
</body>
</html>
